<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Control Structures Practice</title>
</head>
<body onload="pracExer()">
    <p id="message"></p>

    <script>
        function pracExer() {
            //number 1
            let schoolId = prompt("Are you wearing your school ID? (yes/no)");
            let entryCheck;

            if (schoolId.toLowerCase() === "yes") {
                entryCheck = "Welcome to the event!";
            } else {
                entryCheck = "Please show your ID.";
            }

            //number 2
            let student = prompt("Are you a student? (yes/no)");
            let seniorCitizen = prompt("Are you a senior citizen? (yes/no)");
            let jeepneyFare;

            if (student.toLowerCase() === "yes" || seniorCitizen.toLowerCase() === "yes") {
                jeepneyFare = "You get a discounted fare.";
            } else {
                jeepneyFare = "You will pay the regular fare.";
            }

            //number 3
            let score = Number(prompt("Enter your quiz score (0-100):"));
            let quiz;

            if (score < 0 || score > 100) {
                quiz = "Invalid score";
            } else if (score >= 90) {
                quiz = "Excellent";
            } else if (score >= 75) {
                quiz = "Good job";
            } else if (score >= 60) {
                quiz = "You passed";
            } else {
                quiz = "You need to review";
            }

            //number 4
            let choice = prompt("Choose a data promo: A, B, or C").toUpperCase();
            let data;

            switch (choice) {
                case "A":
                    data = "1GB for 1 day";
                    break;
                case "B":
                    data = "5GB for 7 days";
                    break;
                case "C":
                    data = "10GB for 30 days";
                    break;
                default:
                    data = "Invalid choice";
            }

            //number 5
            let name = prompt("Enter your full name:");
            let nameVowel;
            name = name.toLowerCase();
            let vowelCount = 0;
            for (let i = 0; i < name.length; i++) {
                if (name[i] === "a" || 
                    name[i] === "e" || 
                    name[i] === "i" || 
                    name[i] === "o" || 
                    name[i] === "u") {
                    vowelCount++;
                }
            }
            nameVowel = "Your name contains " + vowelCount + " vowels.";

            //number 6
            let username = prompt("Enter a username:");
            let hasSpace = false;
            let usernameValidator;

            for (let i = 0; i < username.length; i++) {
                if (username[i] === " ") {
                    hasSpace = true;
                    break;
                }
            }

            if (hasSpace) {
                usernameValidator = "Username must not contain spaces.";
            } else if (username.length < 6) {
                usernameValidator = "Username must be at least 6 characters.";
            } else {
                usernameValidator = "Valid username.";
            }

            //number 7
            const correctPassword = "Grade9JS";
            let secureLoginSystem;
            let attempts = 0;

            while (attempts < 3) {
                let input = prompt("Enter your password:");
                
                if (input === correctPassword) {
                    secureLoginSystem = "Login successful.";
                    break;
                } else {
                    attempts++;
                    if (attempts === 3) {
                        secureLoginSystem = "Account locked.";
                    } else {
                        secureLoginSystem = "Incorrect password. Try again.";
                    }
                }
            }

            //final message
            document.getElementById("message").innerHTML = 
                entryCheck + "<br>" + 
                jeepneyFare + "<br>" + 
                quiz + "<br>" + 
                data + "<br>" + 
                nameVowel + "<br>" + 
                usernameValidator + "<br>" + 
                secureLoginSystem;
        }
    </script>
</body>
</html>
